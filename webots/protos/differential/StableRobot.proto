#VRML_SIM R2025a utf8

PROTO StableRobot [
  field SFVec3f translation 0 0 0
]
{
  Robot {
    translation IS translation

    children [

      # corpo
      Solid {
        children [
          Shape {
            geometry Box { size 0.3 0.1 0.4 }
          }
        ]
        boundingObject Box { size 0.3 0.1 0.4 }
        physics Physics { mass 1 }
      }

      # roda esquerda (sem joint)
      Solid {
        translation -0.15 0 0
        children [
          Shape {
            geometry Cylinder {
              radius 0.05
              height 0.02
            }
          }
        ]
        boundingObject Cylinder {
          radius 0.05
          height 0.02
        }
        physics Physics { mass 0.1 }
      }

    ]

    boundingObject Box {
      size 0.3 0.1 0.4
    }

    physics Physics {
      mass 1
    }

    controller "void"
  }
}
