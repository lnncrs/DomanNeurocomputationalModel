#VRML_SIM R2025a utf8

PROTO SimpleRobot [
  field SFVec3f translation 0 0 0
]
{
  Robot {
    translation IS translation
    children [

      # Corpo
      Shape {
        appearance PBRAppearance {
          baseColor 0.2 0.2 0.8
        }
        geometry Box {
          size 0.3 0.1 0.4
        }
      }

      # Roda esquerda
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 1 0
          anchor -0.15 0 0
        }
        device [
          RotationalMotor {
            name "left_motor"
          }
        ]
        endPoint Solid {
          children [
            Shape {
              appearance PBRAppearance {
                baseColor 0 0 0
              }
              geometry Cylinder {
                radius 0.05
                height 0.02
              }
            }
          ]
          boundingObject Cylinder {
            radius 0.05
            height 0.02
          }
          physics Physics {
          }
        }
      }

      # Roda direita
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 1 0
          anchor 0.15 0 0
        }
        device [
          RotationalMotor {
            name "right_motor"
          }
        ]
        endPoint Solid {
          children [
            Shape {
              appearance PBRAppearance {
                baseColor 0 0 0
              }
              geometry Cylinder {
                radius 0.05
                height 0.02
              }
            }
          ]
          boundingObject Cylinder {
            radius 0.05
            height 0.02
          }
          physics Physics {
          }
        }
      }

    ]

    controller "main_controller"

    boundingObject Box {
      size 0.3 0.1 0.4
    }

    physics Physics {
      mass 1
    }
  }
}