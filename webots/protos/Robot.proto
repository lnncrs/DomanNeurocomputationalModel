#VRML_SIM R2025a utf8

Robot {
  translation 0 0 0

  children [

    # =========================
    # CUBO (20x20x20)
    # =========================
    Solid {
      translation 0 0.1 0
      children [
        Shape {
          appearance PBRAppearance {
            baseColor 0.2 0.6 1
          }
          geometry Box {
            size 0.2 0.2 0.2
          }
        }
      ]
      boundingObject Box {
        size 0.2 0.2 0.2
      }
      physics Physics {
        mass 1
      }
    }

    # =========================
    # JUNTA + DISCO
    # =========================
    HingeJoint {
      jointParameters HingeJointParameters {

        # eixo perpendicular à face frontal (Z)
        axis 0 0 1

        # centro da face frontal do cubo
        anchor 0 0.1 0.1
      }

      device [
        RotationalMotor {
          name "motor"
          maxTorque 10
        }
      ]

      endPoint Solid {
        translation 0 0.1 0.1

        children [

          # girar cilindro para ficar "de frente"
          Transform {
            rotation 1 0 0 1.57

            children [
              Shape {
                appearance PBRAppearance {
                  baseColor 1 0 0
                }
                geometry Cylinder {
                  radius 0.05
                  height 0.02
                }
              }
            ]
          }

        ]

        boundingObject Cylinder {
          radius 0.05
          height 0.02
        }

        physics Physics {
          mass 0.2
        }
      }
    }

  ]

  controller "void"
}