#VRML_SIM R2025a utf8

PROTO MotorizedCube [
  field SFVec3f    translation  0 0 0
  field SFRotation rotation     0 0 1 0
  field SFString   name         "MotorizedCube"
  field SFString   controller   "void"
  field SFString   motorName    "motor"
]
{
  Robot {
    translation IS translation
    rotation IS rotation
    name IS name
    controller IS controller

    children [
      # Corpo principal (20 x 20 x 20 cm).
      Transform {
        translation 0 0.1 0
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.2 0.6 1
              roughness 1
              metalness 0
            }
            geometry Box {
              size 0.2 0.2 0.2
            }
          }
        ]
      }

      # Disco motorizado na face frontal do cubo.
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 0 1
          anchor 0 0.1 0.1
        }
        device [
          RotationalMotor {
            name IS motorName
            maxTorque 10
          }
        ]
        endPoint Solid {
          translation 0 0.1 0.1
          children [
            Transform {
              rotation 1 0 0 1.5708
              children [
                Shape {
                  appearance PBRAppearance {
                    baseColor 1 0 0
                    roughness 1
                    metalness 0
                  }
                  geometry Cylinder {
                    radius 0.05
                    height 0.02
                  }
                }
              ]
            }
          ]
          boundingObject Pose {
            rotation 1 0 0 1.5708
            children [
              Cylinder {
                radius 0.05
                height 0.02
              }
            ]
          }
          physics Physics {
            mass 0.2
          }
        }
      }
    ]

    boundingObject Pose {
      translation 0 0.1 0
      children [
        Box {
          size 0.2 0.2 0.2
        }
      ]
    }
    physics Physics {
      mass 1
    }
  }
}
